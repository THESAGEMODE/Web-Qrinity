<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Keranjang — THESAGEMODE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="cart-page">
    <header class="page-header">
      <a href="menu.html" class="back-btn" aria-label="kembali">←</a>
      <h1>Keranjang</h1>
      <span id="cart-meja-badge" class="meja-badge small"></span>
    </header>

    <main id="cart-list" class="cart-list"></main>

    <footer id="cart-footer" class="cart-footer" hidden>
      <div class="promo-panel">
        <div class="promo-field">
          <input
            id="promo-code"
            class="promo-input"
            type="text"
            placeholder="Masukkan kode promo"
            aria-label="Kode promo"
          />
          <button id="promo-apply" class="promo-action" type="button">
            Claim
          </button>
        </div>
        <p id="promo-message" class="promo-message">
          Gunakan kode PROMO10 untuk diskon 10%
        </p>
      </div>
      <div class="bill-rows">
        <div class="bill-row">
          <span>Subtotal</span>
          <b id="cart-subtotal">Rp 0</b>
        </div>
        <div class="bill-row" id="discount-row" hidden>
          <span>Diskon</span>
          <b id="cart-discount">- Rp 0</b>
        </div>
        <div class="bill-row" id="promo-row" hidden>
          <span>Promo</span>
          <b id="cart-promo">- Rp 0</b>
        </div>
        <div class="bill-line"></div>
        <div class="bill-row total-row">
          <span>Total</span>
          <b id="cart-total">Rp 0</b>
        </div>
      </div>
      <button id="checkout-btn" class="cta-btn">Pesan Sekarang</button>
    </footer>

    <div id="confirm-order" class="sheet sheet-center" hidden>
      <div class="sheet-backdrop"></div>
      <div class="sheet-panel confirm-panel">
        <button
          class="confirm-close"
          id="confirm-order-close"
          aria-label="tutup"
        >
          ×
        </button>
        <h3 class="confirm-title">Confirm Your Order</h3>
        <div class="confirm-illustration">
          <img
            src="images/confirm-order.png"
            alt="Konfirmasi pesanan"
            width="160"
            height="160"
          />
        </div>
        <div class="confirm-meja-row">
          <span>Meja</span><b id="confirm-meja">-</b>
        </div>
        <ul class="confirm-items" id="confirm-items"></ul>
        <div class="confirm-bill">
          <div class="bill-row">
            <span>Subtotal</span><b id="confirm-subtotal">Rp 0</b>
          </div>
          <div class="bill-row" id="confirm-disc-row" hidden>
            <span>Diskon</span><b id="confirm-discount">- Rp 0</b>
          </div>
          <div class="bill-row" id="confirm-promo-row" hidden>
            <span>Promo</span><b id="confirm-promo">- Rp 0</b>
          </div>
          <div class="bill-line"></div>
          <div class="bill-row total-row">
            <span>Total</span><b id="confirm-total">Rp 0</b>
          </div>
        </div>
        <p class="confirm-text">
          Pastikan pesanan sudah benar sebelum melanjutkan ke pembayaran.
        </p>
        <div class="confirm-actions">
          <button id="confirm-order-cancel" class="btn-outline">Cancel</button>
          <button id="confirm-order-yes" class="btn-primary">Confirm</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
