<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>THESAGEMODE — Welcome</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-page">
  <div class="landing-bg"></div>
  <main class="landing-wrap">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/>
        <rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/>
      </svg>
    </div>
    <h1 class="landing-title">Hello People 🖐, Welcome to <br/>THESAGEMODE !</h1>
    <p class="landing-sub">Silakan lengkapi pesanan Anda dengan memasukkan nama Anda.</p>

    <!-- 3D Table Display -->
    <div class="table-3d-wrapper">
      <div class="table-3d-card">
        <div class="table-3d-face table-3d-front">
          <span class="table-3d-number" id="table-number-display">05</span>
          <span class="table-3d-label">MEJA</span>
        </div>
        <div class="table-3d-face table-3d-side"></div>
        <div class="table-3d-face table-3d-bottom"></div>
      </div>
      <div class="table-detected-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>Meja <span id="table-detected-num">05</span> (Terdeteksi)</span>
      </div>
    </div>

    <form id="customer-form" class="form-stack">
      <label class="field-label" for="name">Nama Anda</label>
      <input id="name" name="name" type="text" required placeholder="Contoh: Emir Abiyyu" class="field-input"/>
    </form>
  </main>
  <button form="customer-form" id="done-btn" class="cta-fixed" type="submit">Selesai</button>
<script src="app.js"></script>
</body>
</html>
