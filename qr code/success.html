<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Pesanan Diterima — THESAGEMODE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="success-page">
    <main class="success-wrap">
      <div class="check-circle">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <h1>Struk Online</h1>
      <p class="muted">
        Terima kasih, pesanan Anda sedang diproses oleh restoran.
      </p>

      <div class="receipt-card">
        <p class="receipt-title">THESAGEMODE</p>
        <div class="receipt-row">
          <span>Nomor Pesanan</span><b id="order-no">#0000</b>
        </div>
        <div class="receipt-row">
          <span>Meja</span><b id="receipt-meja">-</b>
        </div>
        <div class="receipt-row">
          <span>Metode</span><b id="receipt-method">-</b>
        </div>
        <div class="receipt-row">
          <span>Total Bayar</span><b id="receipt-total">Rp 0</b>
        </div>
        <div class="bill-line"></div>
        <div class="receipt-row">
          <span>Status</span
          ><span class="status-pill ok" id="order-status">Diterima</span>
        </div>
      </div>

      <p class="muted small">
        Bagaimana pengalaman Anda? Bantu kami berkembang dengan memberikan
        penilaian.
      </p>
      <a href="review.html" class="cta-btn block">Beri Penilaian & Ulasan</a>
      <a href="index.html" class="cta-btn block ghost">Selesai</a>
    </main>
    <script src="app.js"></script>
  </body>
</html>
